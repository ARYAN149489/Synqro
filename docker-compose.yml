services:
  # ---------- MongoDB ----------
  mongo:
    image: mongo:7
    container_name: chitchat-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- Backend (Express + Socket.io) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chitchat-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/chitchat
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - PORT=3000
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      mongo:
        condition: service_healthy

  # ---------- Frontend (React + Vite → nginx) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This gets baked into the Vite build at compile time
        VITE_BACKEND_URL: http://localhost:3000
    container_name: chitchat-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
